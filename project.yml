name: FamilyHealth
options:
  bundleIdPrefix: com.familyhealth
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  developmentLanguage: zh-Hans
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0.0"
    INFOPLIST_KEY_CFBundleDisplayName: FamilyHealth

targets:
  FamilyHealth:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FamilyHealth
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.familyhealth.app
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSCameraUsageDescription: "用于扫描二维码和拍摄体检报告"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "用于选择体检报告图片"
        SWIFT_EMIT_LOC_STRINGS: YES
        DEVELOPMENT_TEAM: ""
